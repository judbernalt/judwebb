name: Update Projects Index

on:
  push:
    paths:
      - 'data/projects/*.json'
      - '!data/projects/index.json'
  workflow_dispatch:

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate projects index
        run: |
          python3 << 'EOF'
          import json
          import os
          from pathlib import Path

          projects_dir = Path('data/projects')
          projects = []

          for filepath in sorted(projects_dir.glob('*.json')):
              if filepath.name == 'index.json':
                  continue
              
              try:
                  with open(filepath, 'r', encoding='utf-8') as f:
                      project = json.load(f)
                      projects.append(project)
                      print(f"Read: {filepath.name}")
              except Exception as e:
                  print(f"Error reading {filepath.name}: {e}")

          # Sort by year (descending) and then by title
          projects.sort(key=lambda p: (-p.get('year', 0), p.get('title', '')))

          # Write the index file
          index_path = projects_dir / 'index.json'
          with open(index_path, 'w', encoding='utf-8') as f:
              json.dump(projects, f, indent=2, ensure_ascii=False)

          print(f"\nIndex generated with {len(projects)} projects")
          EOF

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/projects/index.json
          git diff --staged --quiet || git commit -m "chore: update projects index [skip ci]"
          git push
